<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TWVM Dashboard</title>
<meta name="theme-color" content="#1e3a8a"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#0b1120;
  min-height:100vh;
  padding:16px;
  display:flex;
  justify-content:center;
}
.container{width:100%;max-width:560px;}
.card{
  background:linear-gradient(180deg,#2c3e8a 0%,#3b5bdb 50%,#4263d4 100%);
  border-radius:14px;overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.header{
  background:linear-gradient(135deg,#1a2456,#2d3a7a);
  padding:20px 18px;text-align:center;
  border-bottom:2px solid rgba(255,255,255,0.15);
  position:relative;
}
.header h1{color:#fff;font-weight:700;font-size:1.7rem;letter-spacing:6px;}
.header h2{color:#cbd5e1;font-weight:700;font-size:0.95rem;letter-spacing:3px;margin-top:2px;text-decoration:underline;}
.logo-circle{
  position:absolute;top:14px;right:14px;
  width:48px;height:48px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);}
.stat-box{padding:10px 6px;text-align:center;border-right:1px solid rgba(255,255,255,0.12);}
.stat-box:last-child{border-right:none;}
.stat-label{color:#fff;font-weight:700;font-size:0.65rem;letter-spacing:0.5px;margin-bottom:6px;}
.stat-value{color:#fff;font-weight:800;font-size:1.4rem;}
.search-section{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.12);border-bottom:1px solid rgba(255,255,255,0.12);}
.search-row{display:flex;align-items:center;gap:8px;}
.search-row label{color:#fff;font-weight:700;font-size:0.78rem;white-space:nowrap;}
.search-row input{flex:1;padding:8px 12px;border:none;border-radius:6px;background:#e9ecf3;color:#1a1a2e;font-size:0.82rem;outline:none;font-family:inherit;}
#search-btn{padding:8px 14px;background:linear-gradient(135deg,#15803d,#22c55e);border:none;border-radius:6px;color:#fff;font-size:0.9rem;cursor:pointer;}
.cond-section{padding:16px 18px;}
.cond-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cond-row:last-child{margin-bottom:0;}
.cond-row .bar-wrap{flex:1;background:#e9ecf3;border-radius:6px;height:34px;position:relative;overflow:hidden;}
.cond-row .bar-fill{height:100%;border-radius:6px;transition:width 0.4s;}
.cond-row .bar-pct{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-weight:700;font-size:0.8rem;color:#1a1a2e;}
.cond-row span.label{color:#fff;font-weight:700;font-size:0.78rem;letter-spacing:0.5px;white-space:nowrap;min-width:90px;text-align:right;}
.summary-title{background:#26326b;color:#fff;font-weight:700;text-align:center;padding:9px;font-size:0.85rem;letter-spacing:1.5px;}
.summary-body{background:rgba(0,0,0,0.15);min-height:280px;max-height:420px;overflow-y:auto;padding:10px;}
.nav-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 18px 18px;}
.nav-btn{padding:10px 4px;background:linear-gradient(135deg,#15803d,#22c55e);border:none;border-radius:8px;color:#fff;font-weight:700;font-size:0.72rem;letter-spacing:0.5px;cursor:pointer;text-align:center;box-shadow:0 3px 10px rgba(34,197,94,0.35);}
.nav-btn.inactive{background:rgba(255,255,255,0.08);box-shadow:none;}
.nav-btn:active{transform:scale(0.96);}
.rec-card{background:rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:0.75rem;color:#e2e8f0;}
.rec-card .ts{color:#7dd3fc;font-weight:700;margin-bottom:4px;}
.rec-card .row{display:flex;justify-content:space-between;margin-bottom:2px;}
.rec-card .row span:first-child{color:#94a3b8;}
.empty-msg{color:#94a3b8;text-align:center;padding:40px 10px;font-size:0.85rem;}
.vehstatus-search{margin-bottom:12px;}
.vehstatus-search input{width:100%;padding:9px 12px;border:none;border-radius:6px;background:#e9ecf3;font-size:0.82rem;outline:none;font-family:inherit;}
.vehstatus-card{background:rgba(255,255,255,0.08);border-radius:8px;padding:12px;color:#e2e8f0;font-size:0.8rem;}
.vehstatus-card .row{display:flex;justify-content:space-between;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08);}
.vehstatus-card .row:last-child{border-bottom:none;margin-bottom:0;}
.tab-content{display:none;}
.tab-content.active{display:block;}
#last-updated{color:#cbd5e1;font-size:0.65rem;text-align:center;padding:6px;}
</style>
</head>
